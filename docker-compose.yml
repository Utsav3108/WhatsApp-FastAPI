version: '3.8'
services:
  app:
    build: .
    container_name: whatsapp_app
    volumes:
      - app_data:/usr/src/app/app/data
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped
    # Uncomment and adjust if you want to override the default command
    # command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  redis:
    image: redis/redis-stack:latest
    container_name: whatsapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  app_data:
    driver: local
  redis_data:
    driver: local
